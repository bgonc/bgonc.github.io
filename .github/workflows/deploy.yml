name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build redirect site
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=https://bgonc.codeberg.page/">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Moved to Codeberg</title>
              <link rel="canonical" href="https://bgonc.codeberg.page/">
              <script>
                window.location.replace("https://bgonc.codeberg.page/" + window.location.hash);
              </script>
            </head>
            <body>
              <p>
                This site moved to
                <a href="https://bgonc.codeberg.page/">bgonc.codeberg.page</a>.
              </p>
            </body>
          </html>
          EOF
          cp _site/index.html _site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
